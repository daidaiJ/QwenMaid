name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "release-windows"

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # package.json — Vite 从此读取 __APP_VERSION__
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # tauri.conf.json
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          # Cargo.toml
          sed -i "0,/^version = .*/s/^version = .*/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          echo "✅ Version synced to ${VERSION}"

      - name: Build frontend
        run: npm run build

      - name: Pre-install NSIS
        shell: bash
        run: |
          NSIS_DIR="$LOCALAPPDATA/tauri/NSIS"
          mkdir -p "$NSIS_DIR"
          if [ ! -f "$NSIS_DIR/Bin/makensis.exe" ]; then
            curl --retry 5 --retry-delay 10 --retry-all-errors -fsSL \
              -o "$RUNNER_TEMP/nsis.zip" \
              "https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip"
            unzip -o "$RUNNER_TEMP/nsis.zip" -d "$NSIS_DIR"
          fi
          mkdir -p "$NSIS_DIR/Plugins/x86-unicode"
          if [ ! -f "$NSIS_DIR/Plugins/x86-unicode/nsis_tauri_utils.dll" ]; then
            curl --retry 5 --retry-delay 10 --retry-all-errors -fsSL \
              -o "$NSIS_DIR/Plugins/x86-unicode/nsis_tauri_utils.dll" \
              "https://github.com/tauri-apps/nsis-tauri-utils/releases/download/nsis_tauri_utils-v0.5.3/nsis_tauri_utils.dll"
          fi

      - name: Generate release body
        id: release-body
        shell: bash
        run: |
          # 找到上一个 tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${{ github.ref_name }}$" | tail -1)
          if [ "$PREV_TAG" = "${{ github.ref_name }}" ] || [ -z "$PREV_TAG" ]; then
            echo "## ${{ github.ref_name }}" > RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            git log --pretty=format:"- %s (%h)" -20 >> RELEASE_BODY.md
          else
            echo "## ${{ github.ref_name }}" > RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            echo "### Changes since $PREV_TAG" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" >> RELEASE_BODY.md
          fi
          echo "" >> RELEASE_BODY.md
          # 多行内容写入 GITHUB_OUTPUT
          {
            echo "body<<RELEASE_EOF"
            cat RELEASE_BODY.md
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QWenMaid ${{ github.ref_name }}"
          releaseBody: ${{ steps.release-body.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
