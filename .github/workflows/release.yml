name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "release-windows"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i "0,/^version = .*/s/^version = .*/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: Pre-install NSIS (cached)
        shell: pwsh
        run: |
          $nsisDir = Join-Path $env:USERPROFILE ".cache\tauri\NSIS"
          if (!(Test-Path "$nsisDir\Bin\makensis.exe")) {
            New-Item -ItemType Directory -Force -Path $nsisDir | Out-Null
            $zip = Join-Path $env:RUNNER_TEMP "nsis.zip"
            for ($i=1; $i -le 5; $i++) {
              try {
                Invoke-WebRequest -Uri "https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip" -OutFile $zip -TimeoutSec 120
                Expand-Archive -Path $zip -DestinationPath $nsisDir -Force
                break
              } catch { Write-Host "Attempt $i failed, retrying..."; Start-Sleep -Seconds (10 * $i) }
            }
          }
          if (!(Test-Path "$nsisDir\Plugins\x86-unicode\nsis_tauri_utils.dll")) {
            $dll = Join-Path $nsisDir "Plugins\x86-unicode\nsis_tauri_utils.dll"
            for ($i=1; $i -le 5; $i++) {
              try {
                Invoke-WebRequest -Uri "https://github.com/tauri-apps/nsis-tauri-utils/releases/download/nsis_tauri_utils-v0.5.3/nsis_tauri_utils.dll" -OutFile $dll -TimeoutSec 120
                break
              } catch { Write-Host "Attempt $i failed, retrying..."; Start-Sleep -Seconds (10 * $i) }
            }
          }

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QWenMaid ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
